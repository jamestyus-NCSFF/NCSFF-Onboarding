<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>NCSFF Navigator v11.1</title>
    
    <!-- Core Dependencies (Strict Order) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js" crossorigin></script>
    <!-- FIX: Load PropTypes before Recharts -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Fonts & Assets -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        black: "#000000",
                        white: "#FFFFFF",
                        "coral-start": "#FF7E5F", 
                        "coral-end": "#FEB47B",
                        "teal-start": "#4facfe",
                        "teal-end": "#00f2fe",
                    },
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                        display: ["Inter", "sans-serif"],
                    },
                    boxShadow: {
                        'dock': '0 20px 40px -10px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.2) inset',
                        'cinematic': '0 40px 80px -20px rgba(0, 0, 0, 0.5)',
                        'glow': '0 0 20px rgba(255, 126, 95, 0.4)',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'reveal': 'reveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'fade-in': 'fadeIn 1.2s ease-out forwards',
                        'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
                        'subtle-zoom': 'subtleZoom 20s ease-in-out infinite',
                        'spin-slow': 'spin 12s linear infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        reveal: {
                            '0%': { opacity: '0', transform: 'translateY(40px) scale(0.95)' },
                            '100%': { opacity: '1', transform: 'translateY(0) scale(1)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        subtleZoom: {
                            '0%, 100%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(1.08)' },
                        }
                    }
                },
            },
        };
    </script>

    <style>
body {
            background-color: #ffffff;
            color: #000000;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel {
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            background-color: rgba(255, 255, 255, 0.75);
        }
        .glass-dock {
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            background-color: rgba(255, 255, 255, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* ==========================================================================
           SURGICAL CONTROL PANEL (14 KNOBS)
           ========================================================================== */

        /* --- SECTION A: MODULE 0 HERO (ONLY) --- */

        /* 1. MOD 0 HERO WIDTH [MODULE 0 ONLY] */
        /* Controls the width of the background image on the landing page only. */
        /* TWEAK: Change 100% to 1200px to make it narrow. */
        main > section:first-of-type .max-w-\[1600px\],
        main > section:first-of-type .max-w-\[1400px\] {
            max-width: 100% !important; 
            width: 100% !important;
        }

        /* 2. MOD 0 TITLE ALIGNMENT [MODULE 0 ONLY] */
        /* Controls how close the "Invitation" title sits to the left edge. */
        /* TWEAK: Change 2rem to 0 to make it touch the edge. */
        main > section:first-of-type .px-6, 
        main > section:first-of-type .sm\:px-12 {
            padding-left: 0.5rem !important; 
        }

        /* --- SECTION B: GLOBAL LAYOUT (REST OF SITE) --- */

        /* 3. HERO HEIGHT [GLOBAL] */
        /* Affects all Hero banners (Modules 0, 3, 4, 5, 6). */
        /* TWEAK: Change 60vh to 50vh (shorter) or 100vh (full screen). */
        section.min-h-screen {
            min-height: 60vh !important; 
            padding-top: 5rem !important;
        }

        /* 4. STANDARD PAGE WIDTH [GLOBAL EXCEPT MOD 0] */
        /* Affects Maps, Grids, and Content for all other modules. */
        /* TWEAK: Change 1152px to 1280px (wider) or 1024px (narrower). */
        section:not(:first-of-type) .max-w-\[1600px\], 
        section:not(:first-of-type) .max-w-\[1400px\] {
            max-width: 1024px !important; 
        }

        /* 5. VERTICAL SPACING [GLOBAL] */
        /* Controls the white space gaps between sections everywhere. */
        /* TWEAK: Change 5rem to 3rem (tighter). */
        .py-24, .md\:py-32, .py-32 {
            padding-top: 3rem !important; 
            padding-bottom: 3rem !important;
        }

        /* --- SECTION C: TYPOGRAPHY (GLOBAL) --- */

        /* 6. HERO TITLE SIZE [GLOBAL] */
        /* TWEAK: Change 4.5rem to 5.5rem (larger). */
        .text-6xl, .md\:text-8xl { 
            font-size: 4.5rem !important; 
            line-height: 1.1 !important; 
        }
        
        /* 7. SECTION HEADER SIZE [GLOBAL] */
        /* TWEAK: Change 2.5rem to 3rem (larger). */
        .text-4xl, .md\:text-5xl { 
            font-size: 2.5rem !important; 
        }

        /* 8. BODY TEXT SIZE [GLOBAL] */
        /* TWEAK: Change 1.125rem to 1rem (smaller). */
        .text-xl { 
            font-size: 1rem !important; 
            line-height: 1.75rem !important; 
        }

        /* --- SECTION D: BRIEFING CARDS (TARGETED) --- */

        /* 9. BRIEFING CARD WIDTH [TARGETED] */
        /* Affects ONLY the text boxes (Briefing, Debrief). */
        /* TWEAK: Change 800px to 650px (narrower). */
        .max-w-4xl {
            max-width: 700px !important; 
        }

        /* 10. TEXT FILL [TARGETED] */
        /* Forces text to fill the card ONLY inside Briefing/Debrief boxes. */
        /* TWEAK: Change 100% to '65ch' to limit line length. */
        .max-w-4xl .prose, 
        .max-w-4xl p {
            max-width: 110% !important; 
        }

        /* --- SECTION E: TOP NAV BAR (GLOBAL) --- */

        /* 11. NAV BAR THICKNESS [GLOBAL] */
        /* TWEAK: Change 0.5rem to 1rem (thicker). */
        header, header > div { 
            padding-top: 0.2rem !important; 
            padding-bottom: 0.2rem !important;
            min-height: 0 !important; 
            height: auto !important;
        }

        /* 12. LOGO SIZE [GLOBAL] */
        /* TWEAK: Change 2.5rem to 3rem (larger). */
        header img { 
            height: 2.5rem !important; 
            width: auto !important;
        }

        /* 13. NAV BUTTON SIZE [GLOBAL] */
        /* TWEAK: Change 0.75rem to 0.65rem (smaller). */
        header nav button { 
            padding: 0.5rem 1rem !important; 
            font-size: 0.5rem !important; 
        }
        
        /* 14. GRID ICON SIZE [GLOBAL] */
        /* TWEAK: Change 2rem to 1.5rem (smaller). */
        header .text-3xl {
            font-size: 1.5rem !important; 
        }
p {
    text-wrap: pretty;
}

    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // --- GLOBAL IMPORTS & SETUP ---
        const { useState, useEffect, useRef, useMemo, useLayoutEffect } = React;
        const { createPortal } = ReactDOM;
        // Safe extraction of Recharts components
        const { AreaChart, Area, ResponsiveContainer } = window.Recharts || {};

        // --- PART 1 ENDS HERE ---
// --- GLOBAL SHARED COMPONENTS ---

        // 1. RevealSection (Scroll Animation Wrapper)
        const RevealSection = ({ children, className = "", id }) => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                        }
                    },
                    { threshold: 0.15 }
                );
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);

            return (
                <div 
                    ref={ref} 
                    id={id}
                    className={`${className} transition-all duration-1000 ${isVisible ? 'opacity-100 translate-y-0 scale-100' : 'opacity-0 translate-y-20 scale-[0.98]'}`}
                >
                    {children}
                </div>
            );
        };

        // 2. VideoModal (For Hero & Welcome Message)
        const VideoModal = ({ onClose, videoUrl, onProceed }) => {
            const embedUrl = `${videoUrl}?autoplay=0`;

            return createPortal(
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-10">
                    <div 
                        className="absolute inset-0 bg-black/40 backdrop-blur-xl animate-fade-in"
                        onClick={onClose}
                    ></div>
                    <div 
                        className="relative w-full max-w-6xl max-h-[90vh] bg-black rounded-[2rem] overflow-y-auto hide-scrollbar shadow-2xl border border-white/10 animate-reveal flex flex-col"
                        onClick={(e) => e.stopPropagation()}
                    >
                        <button 
                            onClick={onClose}
                            className="absolute top-6 right-6 z-50 w-14 h-14 rounded-full bg-black/40 hover:bg-white/10 text-white backdrop-blur-xl flex items-center justify-center transition-all border border-white/10 group shadow-lg"
                        >
                            <span className="material-symbols-outlined group-hover:rotate-90 transition-transform text-2xl">close</span>
                        </button>
                        <div className="relative w-full aspect-video bg-black shrink-0">
                            <iframe 
                                src={embedUrl}
                                loading="eager" 
                                title="Welcome Message"
                                allow="fullscreen; encrypted-media; picture-in-picture" 
                                className="absolute inset-0 w-full h-full border-none"
                            ></iframe>
                        </div>
                        {onProceed && (
                            <div className="w-full p-6 bg-neutral-900 border-t border-white/10 flex justify-center items-center shrink-0">
                                <button 
                                    onClick={onProceed}
                                    className="px-8 py-3 bg-white text-black font-bold rounded-full shadow-glow hover:scale-105 transition-all flex items-center gap-3 group"
                                >
                                    <span>Start Module 0</span>
                                    <span className="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
                                </button>
                            </div>
                        )}
                    </div>
                </div>,
                document.body
            );
        };

        // 3. ProTipVideo (The Circular Video Component)
        const ProTipVideo = ({ videoId, className = "", focalPoint = 50, zoom = 1.0 }) => {
            const [shouldRender, setShouldRender] = useState(false);

            useEffect(() => {
                const timer = setTimeout(() => { setShouldRender(true); }, 1000);
                return () => clearTimeout(timer);
            }, []);

            const customerDomain = "customer-i5tgv5ca2njx753s.cloudflarestream.com";
            const src = `https://${customerDomain}/${videoId}/iframe?autoplay=false&loop=false&poster=https%3A%2F%2F${customerDomain}%2F${videoId}%2Fthumbnails%2Fthumbnail.jpg%3Ftime%3D%26height%3D600`;

            if (!shouldRender) {
                return (
                     <div className={`${className} z-30 flex flex-col items-center animate-pulse`}>
                        <div className="w-48 h-48 md:w-64 md:h-64 rounded-full border-4 border-white/50 bg-black/50"></div>
                     </div>
                );
            }

            const baseWidth = 280 * zoom;
            const baseHeight = 158 * zoom;

            return (
                <div className={`${className} z-30 flex flex-col items-center animate-fade-in`}>
                    <div className="flex items-center gap-2 bg-white text-slate-700 px-4 py-2 rounded-full shadow-lg mb-4 border border-slate-100/50 backdrop-blur-md">
                        <span className="material-symbols-outlined text-sm text-amber-500 fill-current">lightbulb</span>
                        <span className="text-[10px] font-bold uppercase tracking-widest">Pro Tip</span>
                    </div>
                    <div className="relative w-48 h-48 md:w-64 md:h-64 rounded-full border-4 border-white shadow-2xl bg-black overflow-hidden group ring-1 ring-black/5 transform transition-transform active:scale-95">
                        <iframe 
                            src={src}
                            style={{ 
                                transform: `translate(-${focalPoint}%, -50%)`,
                                width: `${baseWidth}%`,
                                height: `${baseHeight}%`
                            }}
                            className="absolute top-1/2 left-1/2 max-w-none"
                            title="Pro Tip Video"
                            allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;"
                            tabIndex="-1"
                            loading="lazy"
                        ></iframe>
                    </div>
                </div>
            );
        };

        // 4. NarrativeBridge (Glassmorphism Transition Card)
        const NarrativeBridge = ({ lines, onNext, theme = 'light' }) => (
            <div className="max-w-4xl mx-auto py-24 px-6 animate-fade-in relative z-10">
                <div className={`
                    backdrop-blur-xl border shadow-2xl rounded-[2.5rem] p-10 md:p-16 text-center relative overflow-hidden transition-all duration-500 hover:scale-[1.01]
                    ${theme === 'dark' 
                        ? 'bg-slate-900/60 border-white/10 shadow-[0_0_40px_rgba(0,0,0,0.5)]' 
                        : 'bg-white/60 border-white/40 shadow-xl'
                    }
                `}>
                    <div className={`absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-coral-start to-transparent opacity-60`}></div>
                    <div className="space-y-6 relative z-10">
                        {lines.map((line, idx) => (
                            <p key={idx} className={`text-xl font-light leading-relaxed text-balance ${theme === 'dark' ? 'text-white/90' : 'text-black/80'}`}>
                                {line}
                            </p>
                        ))}
                    </div>
                    <div className="mt-12 flex justify-center">
                        <button 
                            onClick={onNext}
                            className={`group flex items-center justify-center gap-3 px-8 py-4 rounded-full border shadow-sm hover:shadow-md transition-all ${theme === 'dark' ? 'bg-white/10 border-white/20 hover:bg-white/20' : 'bg-white border-slate-200 hover:bg-slate-50'}`}
                        >
                            <span className={`text-xs font-bold uppercase tracking-widest transition-colors ${theme === 'dark' ? 'text-white/70 group-hover:text-white' : 'text-black/40 group-hover:text-coral-start'}`}>Continue Journey</span>
                            <span className={`material-symbols-outlined text-lg animate-bounce transition-colors ${theme === 'dark' ? 'text-white/70 group-hover:text-white' : 'text-black/40 group-hover:text-coral-start'}`}>arrow_downward</span>
                        </button>
                    </div>
                </div>
            </div>
        );

        // --- PART 2 ENDS HERE ---
// --- PART 3: NAVIGATOR & HERO ---

        // 1. Navigator Grid Data
        const gridItems = [
            { id: 'ledger', label: 'The Ledger', icon: 'account_balance_wallet', description: 'Budget vs. Actuals dashboard.' },
            { id: 'bylaws', label: 'The Bylaws', icon: 'gavel', description: 'Annotated governing documents.' },
            { id: 'lexicon', label: 'The Lexicon', icon: 'menu_book', description: 'Boardroom Rosetta Stone & Terminology.' },
            { id: 'playbook', label: 'The Playbook', icon: 'campaign', description: 'Advocacy scripts & impact data.' },
            { id: 'strategy', label: 'The Strategy', icon: 'flag', description: '5 and 10 year strategic goals.' },
            { id: 'network', label: 'The Network', icon: 'hub', description: 'Institutional ecosystem map.' },
            { id: 'service', label: 'Service', icon: 'volunteer_activism', description: 'Committee and track sign-up.' },
            { id: 'drive', label: 'The Drive', icon: 'folder_shared', description: 'Asset repository access.' },
            { id: 'safeguards', label: 'The Safeguards', icon: 'security', description: 'Risk & reputation protocols.' },
        ];

        // 2. NavigatorGrid Component
        const NavigatorGrid = ({ onItemClick, highlightedId }) => {
            return (
                <div className="grid grid-cols-3 gap-3 p-1">
                    {gridItems.map((item) => (
                        <button
                            key={item.id}
                            onClick={() => onItemClick(item.id)}
                            className={`
                                aspect-square flex flex-col items-center justify-center gap-2 rounded-xl border transition-all duration-300 group
                                ${highlightedId === item.id 
                                    ? 'bg-coral-start text-white border-coral-start shadow-glow scale-105 z-10' 
                                    : 'bg-slate-50 border-slate-100 hover:bg-white hover:border-black/10 hover:shadow-lg text-black/60 hover:text-black'
                                }
                            `}
                        >
                            <span className="material-symbols-outlined text-3xl group-hover:scale-110 transition-transform">{item.icon}</span>
                            <span className="text-[10px] uppercase font-bold tracking-wider text-center px-1">{item.label}</span>
                        </button>
                    ))}
                </div>
            );
        };

        // 3. SidePanel Component
        const SidePanel = ({ 
            isOpen, 
            onClose, 
            type, 
            onGridItemClick, 
            highlightedGridId,
            navLinks,
            currentModule,
            maxUnlockedModule,
            onSelectModule
        }) => {
            const getTitle = () => {
                switch(type) {
                    case 'navigator': return 'Navigator Grid';
                    case 'alerts': return 'Notifications';
                    case 'menu': return 'Course Navigation';
                    default: return 'Menu';
                }
            };

            return (
                <React.Fragment>
                    <div 
                        className={`fixed inset-0 bg-black/20 backdrop-blur-sm z-[60] transition-opacity duration-300 ${isOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}
                        onClick={onClose}
                    ></div>

                    <div className={`fixed top-4 bottom-4 right-4 w-full md:w-[480px] z-[70] bg-white rounded-3xl shadow-2xl transform transition-transform duration-500 ease-[cubic-bezier(0.32,0.72,0,1)] ${isOpen ? 'translate-x-0' : 'translate-x-[110%]'}`}>
                        <div className="h-full flex flex-col p-8">
                            <div className="flex justify-between items-center mb-8">
                                <h2 className="text-3xl font-bold tracking-tight">{getTitle()}</h2>
                                <button onClick={onClose} className="p-2 hover:bg-slate-100 rounded-full transition-colors">
                                    <span className="material-symbols-outlined">close</span>
                                </button>
                            </div>

                            <div className="flex-1 overflow-y-auto hide-scrollbar">
                                {type === 'navigator' && onGridItemClick && (
                                    <div className="animate-fade-in-up">
                                        <p className="text-black/50 mb-6">Persistent toolkit for high-performance governance.</p>
                                        <NavigatorGrid onItemClick={onGridItemClick} highlightedId={highlightedGridId} />
                                    </div>
                                )}
                                
                                {type === 'alerts' && (
                                    <div className="space-y-4 animate-fade-in-up">
                                        <div className="p-4 rounded-2xl bg-coral-start/10 border border-coral-start/20">
                                            <div className="flex gap-3">
                                                <span className="material-symbols-outlined text-coral-start">priority_high</span>
                                                <div>
                                                    <h4 className="font-bold text-sm text-coral-start">Action Required</h4>
                                                    <p className="text-sm text-black/70 mt-1">Submit fiscal review by EOD.</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {type === 'menu' && navLinks && (
                                    <div className="space-y-3 animate-fade-in-up">
                                        <p className="text-black/50 mb-6 px-2 text-sm">Jump to an unlocked module or view your progress.</p>
                                        {navLinks.map((link) => {
                                            const isLocked = link.id > (maxUnlockedModule ?? 0);
                                            const isActive = link.id === currentModule;
                                            
                                            return (
                                                <button
                                                    key={link.id}
                                                    disabled={isLocked}
                                                    onClick={() => onSelectModule?.(link.id)}
                                                    className={`
                                                        w-full flex items-center justify-between p-6 rounded-2xl border transition-all
                                                        ${isActive 
                                                            ? 'bg-black text-white border-black shadow-lg scale-[1.02]' 
                                                            : isLocked 
                                                                ? 'bg-slate-50 border-transparent opacity-40 cursor-not-allowed' 
                                                                : 'bg-white border-black/5 hover:border-black/20 hover:bg-slate-50'
                                                        }
                                                    `}
                                                >
                                                    <div className="flex items-center gap-4">
                                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-bold ${isActive ? 'bg-coral-start text-white' : 'bg-black/5 text-black/40'}`}>
                                                            {link.id}
                                                        </div>
                                                        <span className="font-bold text-sm uppercase tracking-widest">{link.label}</span>
                                                    </div>
                                                    {isLocked ? (
                                                        <span className="material-symbols-outlined text-sm opacity-40">lock</span>
                                                    ) : (
                                                        isActive && <span className="material-symbols-outlined text-coral-start">arrow_forward</span>
                                                    )}
                                                </button>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                            
                            
                        </div>
                    </div>
                </React.Fragment>
            );
        };

        // 4. Hero Component
        const Hero = () => {
            const [offset, setOffset] = useState(0);
            const [showVideo, setShowVideo] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const handleScroll = () => {
                    if (ref.current) {
                        const speed = 0.4;
                        setOffset(window.scrollY * speed);
                    }
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const scrollToBriefing = () => {
                const element = document.getElementById('briefing-header');
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            };

            return (
                <section className="min-h-screen flex flex-col justify-center px-4 sm:px-6 pt-24 pb-12 relative overflow-hidden">
                    <div className="max-w-[1600px] mx-auto w-full z-10 h-[85vh] min-h-[600px]">
                        <div ref={ref} className="w-full h-full relative rounded-[2.5rem] overflow-hidden shadow-cinematic group bg-black">
                            {/* Parallax Image Wrapper */}
                            <div 
                                className="absolute inset-0 w-full h-[120%] top-0 left-0"
                                style={{ transform: `translateY(-${Math.min(offset, 100)}px)` }}
                            >
                                <img 
                                    alt="Futuristic digital earth network visualization" 
                                    className="w-full h-full object-cover opacity-80 group-hover:opacity-90 transition-opacity duration-700 animate-subtle-zoom" 
                                    src="https://picsum.photos/seed/earth/1920/1080" 
                                    fetchPriority="high"
                                    loading="eager"
                                />
                            </div>
                            
                            {/* Gradient Overlay */}
                            <div className="absolute inset-0 bg-gradient-to-r from-black/90 via-black/50 to-transparent pointer-events-none"></div>

                            {/* Content */}
                            <div className="absolute inset-0 flex flex-col justify-center px-8 md:px-16 lg:px-24 z-20 pointer-events-none">
                                <div className="max-w-4xl relative pointer-events-auto">
                                    <div className="inline-flex items-center px-4 py-1.5 rounded-full border border-white/20 bg-white/10 backdrop-blur-md mb-8 animate-fade-in-up">

};

                    });

                // Score Interests

                    const matches = DB.index.interests[interest] || [];

                        if(scores[act]) {
                            scores[act].score += 1; 
                            scores[act].matches.push(`Interest: ${interest}`);
                        }

                Object.keys(scores).forEach(actName => {

                        const area = DB.activities[actName].area;
                        if (!areaScores[area]) {
                            areaScores[area] = { totalScore: 0, activities: [] };

                        areaScores[area].totalScore += data.score;
                        areaScores[area].activities.push({
                            name: actName,
                            score: data.score,
                            matches: data.matches
                        });
                    }
                });

                // Convert to array and sort
                const sortedAreas = Object.keys(areaScores).map(areaName => ({
                    name: areaName,
                    ...areaScores[areaName]
                })).sort((a, b) => b.totalScore - a.totalScore);

                return sortedAreas.slice(0, 3);

                        <div className="grid grid-cols-1 gap-4">
  {serviceTracks.map((track) => {
    const isSelected = selectedTrack === track.id;

  })}

                                                bg: 'bg-slate-50'

                <div className="fixed inset-0 z-[9999] flex items-center justify-center p-6 bg-black/80 backdrop-blur-lg animate-fade-in" onClick={onClose}>
                    <div className="bg-slate-900 border border-white/20 rounded-[2.5rem] w-full max-w-2xl shadow-2xl relative animate-reveal flex flex-col overflow-hidden text-white" onClick={(e) => e.stopPropagation()}>
                        <button onClick={onClose} className="absolute top-6 right-6 w-10 h-10 rounded-full bg-white/5 hover:bg-white/10 text-white flex items-center justify-center transition-all z-50"><span className="material-symbols-outlined">close</span></button>
                        <div className="p-10 md:p-12 space-y-6">
                            <h3 className="text-3xl font-bold tracking-tight">Privacy Policy</h3>
                            <p className="text-white/80 leading-relaxed font-light">This application is designed to support structured learning and strategic alignment. Progress and interaction data are stored locally within your browser session to maintain continuity. This system does not transmit personal identifying information to external servers.</p>
                            <div className="p-6 bg-white/5 rounded-2xl border border-white/10 mt-6">
                                <p className="text-sm font-medium italic text-white/60">Attribution: This digital environment and its associated learning modules were developed by IXL Precision Learning Solutions exclusively for the North Carolina Science Fair Foundation.</p>
                            </div>
                        </div>
                    </div>
                </div>, document.body
            );
        };

        const TermsModal = ({ onClose }) => {
            useEffect(() => { document.body.style.overflow = 'hidden'; return () => { document.body.style.overflow = ''; }; }, []);
            return createPortal(
                <div className="fixed inset-0 z-[9999] flex items-center justify-center p-6 bg-black/80 backdrop-blur-lg animate-fade-in" onClick={onClose}>
                    <div className="bg-slate-900 border border-white/20 rounded-[2.5rem] w-full max-w-2xl shadow-2xl relative animate-reveal flex flex-col overflow-hidden text-white" onClick={(e) => e.stopPropagation()}>
                        <button onClick={onClose} className="absolute top-6 right-6 w-10 h-10 rounded-full bg-white/5 hover:bg-white/10 text-white flex items-center justify-center transition-all z-50"><span className="material-symbols-outlined">close</span></button>
                        <div className="p-10 md:p-12 space-y-6">
                            <h3 className="text-3xl font-bold tracking-tight">Terms of Use</h3>
                            <p className="text-white/80 leading-relaxed font-light">Access to this application is provided for authorized users engaging with the training and strategic materials contained herein. The content, structural frameworks, and operational logic are proprietary. Users may not duplicate, reverse engineer, or distribute the underlying code or content without explicit authorization.</p>
                            <div className="p-6 bg-white/5 rounded-2xl border border-white/10 mt-6">
                                <p className="text-sm font-medium italic text-white/60">Attribution: This digital environment and its associated learning modules were developed by IXL Precision Learning Solutions exclusively for the North Carolina Science Fair Foundation.</p>
                            </div>
                        </div>
                    </div>
                </div>, document.body
            );
        };

        // --- MAIN APP COMPONENT ---

        const App = () => {
            const [activePanel, setActivePanel] = useState(null);
            const [scrolled, setScrolled] = useState(false);
            
            // Gates & Unlock State
            const [navigatorUnlocked, setNavigatorUnlocked] = useState(false);
            const [bylawsUnlocked, setBylawsUnlocked] = useState(false);
            const [playbookUnlocked, setPlaybookUnlocked] = useState(false);
const [serviceUnlocked, setServiceUnlocked] = useState(false);
            const [selectedTrack, setSelectedTrack] = useState(null);
            const [selectedSkills, setSelectedSkills] = useState(new Set());
            const [selectedInterests, setSelectedInterests] = useState(new Set());
            
            // Elevated Module States
            const [module1Cards, setModule1Cards] = useState(initialSortingCards);
            
            const [m2SelectedRegion, setM2SelectedRegion] = useState(null);
            const [m2ScenarioStage, setM2ScenarioStage] = useState(1);
            const [m2ScenarioFeedback, setM2ScenarioFeedback] = useState(null);
            const [m2CompletedStages, setM2CompletedStages] = useState([]);
            const [m2Checklist, setM2Checklist] = useState([false, false, false, false]);

            // Module 3 Elevated States
            const [m3ActivePathway, setM3ActivePathway] = useState(null);
            const [m3FiscalPart1, setM3FiscalPart1] = useState(null);
            const [m3FiscalPart2, setM3FiscalPart2] = useState(null);
            const [ledgerUnlocked, setLedgerUnlocked] = useState(false);


            // Module 4 Elevated States
            const [m4Assignments, setM4Assignments] = useState({});
            const [m4CurrentLeadIdx, setM4CurrentLeadIdx] = useState(0);
            const [m4CurrentStepIdx, setM4CurrentStepIdx] = useState(0);
            const [m4DialogueFeedback, setM4DialogueFeedback] = useState(null);
            const [m4DialogueCorrect, setM4DialogueCorrect] = useState(null);
            const [m4CompletedDialogueSteps, setM4CompletedDialogueSteps] = useState([]);
            const [m4PivotScenarioIdx, setM4PivotScenarioIdx] = useState(0);
            const [m4PivotPhase, setM4PivotPhase] = useState(1);
            const [m4PivotFeedback, setM4PivotFeedback] = useState(null);
            const [m4PivotCorrect, setM4PivotCorrect] = useState(null);
            const [m4CompletedPivots, setM4CompletedPivots] = useState([]);

            // Module 5 Elevated States
            const [m5SelectedTrack, setM5SelectedTrack] = useState(null);

            // Module 6 Elevated States
            const [m6SelectedDiag, setM6SelectedDiag] = useState(null);
            const [m6Inquiries, setM6Inquiries] = useState({ ledger: '', bylaws: '', fairops: '', playbook: '' });
            const [m6LockedInquiries, setM6LockedInquiries] = useState({ ledger: false, bylaws: false, fairops: false, playbook: false });
            const [m6ActiveMeetingGap, setM6ActiveMeetingGap] = useState(null);
            const [m6SelectedMilestone, setM6SelectedMilestone] = useState(null);
            const [m6IsNotified, setM6IsNotified] = useState(false);
            const [m6IsFinished, setM6IsFinished] = useState(false);

// Visual Hint State



            const [showGridHighlight, setShowGridHighlight] = useState(false);
            
            // Modal Visibility State
            const [showLexicon, setShowLexicon] = useState(false);
const [showBylaws, setShowBylaws] = useState(false);
const [showPrivacy, setShowPrivacy] = useState(false);
const [showTerms, setShowTerms] = useState(false);

            const [showSafeguards, setShowSafeguards] = useState(false);
const [showNetwork, setShowNetwork] = useState(false);

            const [showStrategy, setShowStrategy] = useState(false);
            const [showPlaybook, setShowPlaybook] = useState(false);
            
            // Navigation State
            const [currentModule, setCurrentModule] = useState(0);
            const [maxUnlockedModule, setMaxUnlockedModule] = useState(6); // 0-6

            // Scroll Listener
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            // Scroll to top on module change
            useEffect(() => {
                window.scrollTo(0, 0);
            }, [currentModule]);

            const togglePanel = (panelName) => {
            setActivePanel(activePanel === panelName ? null : panelName);
            // Trigger visual hint if opening navigator at specific gate points
            if (panelName === 'navigator') {
                if (currentModule === 0 && !navigatorUnlocked) setShowGridHighlight(true);
                else if (currentModule === 1 && !bylawsUnlocked) setShowGridHighlight(true);
                else if (currentModule === 3 && !ledgerUnlocked) setShowGridHighlight(true);
                else if (currentModule === 4 && !playbookUnlocked) setShowGridHighlight(true);
                else if (currentModule === 5 && !serviceUnlocked) setShowGridHighlight(true);
            }
        };


            const handleGridItemClick = (id) => {
            if (id === 'ledger') {
                if (currentModule === 3 && !ledgerUnlocked) {
                    setLedgerUnlocked(true);
                    setShowGridHighlight(false);
                }
                window.open('https://drive.google.com/file/d/1qP05K-KiQ1EXW0Fu7-pu6ZUau2wuX1Ow/view?usp=drive_link', '_blank');
                setActivePanel(null);
            }
               
 if (id === 'network') {
  setShowNetwork(true);
  setActivePanel(null);
}
if (id === 'strategy') {

                    if (!navigatorUnlocked && currentModule === 0) {
                        setNavigatorUnlocked(true);
                        setShowGridHighlight(false);
                    }
                    setShowStrategy(true);
                    setActivePanel(null);
                }
                if (id === 'bylaws') {
                    if (currentModule === 1 && !bylawsUnlocked) {
                        setBylawsUnlocked(true);
                        setShowGridHighlight(false);
                    }
                    setShowBylaws(true);
                    setActivePanel(null);
                }
                if (id === 'playbook') {
                    if (currentModule === 4 && !playbookUnlocked) {
                        setPlaybookUnlocked(true);
                        setShowGridHighlight(false);
                    }
                    setShowPlaybook(true);
                    setActivePanel(null);
                }
                if (id === 'lexicon') {
                    setShowLexicon(true);
                    setActivePanel(null);
                }
if (id === 'safeguards') {
                setShowSafeguards(true);
                setActivePanel(null);
            }

                if (id === 'drive') {
window.open('https://drive.google.com/drive/folders/1NCfesjcvkeaANFIww6WRVTS8vqScZ7TJ?usp=drive_link', '_blank');
setActivePanel(null);
}
if (id === 'service') {
if (currentModule === 5) setServiceUnlocked(true); window.open('https://forms.gle/i7eYWwBoEvKFBS7z7', '_blank'); setActivePanel(null);
}

                // Default close behavior for items without specific modals yet
                if (!['strategy', 'bylaws', 'lexicon', 'playbook', 'drive'].includes(id)) {
                    setActivePanel(null);
                }
            };

            const navLinks = [
                { id: 0, label: 'Invitation' },
                { id: 1, label: 'Identity' },
                { id: 2, label: 'Infrastructure' },
                { id: 3, label: 'Stewardship' },
                { id: 4, label: 'External Engine' },
                { id: 5, label: 'Internal Engine' },
                { id: 6, label: 'Mission-Ready' },
            ];

            const handleCompleteModule = (id) => {
                const next = id + 1;
                if (next <= 6) {
                    setMaxUnlockedModule(Math.max(maxUnlockedModule, next));
                    setCurrentModule(next);
                }
            };

            // Calculate if the grid button should pulse
           const shouldPulseGrid =
            (!navigatorUnlocked && currentModule === 0) ||
            (!bylawsUnlocked && currentModule === 1) ||
            (!ledgerUnlocked && currentModule === 3) ||
            (!playbookUnlocked && currentModule === 4) ||
            (!serviceUnlocked && currentModule === 5);



            const getHighlightedId = () => {
            if (currentModule === 0 && !navigatorUnlocked) return 'strategy';
            if (currentModule === 1 && !bylawsUnlocked) return 'bylaws';
            if (currentModule === 3 && !ledgerUnlocked) return 'ledger';
            if (currentModule === 4 && !playbookUnlocked) return 'playbook';
            if (currentModule === 5 && !serviceUnlocked) return 'service';
            return null;
        };



            return (
                <div className="min-h-screen bg-white font-sans selection:bg-coral-start selection:text-white pb-32 relative text-black">
                    {/* Header */}
                    <header className={`fixed top-0 left-0 w-full z-40 px-6 md:px-8 py-4 flex justify-between items-center transition-all duration-300 ${scrolled ? 'glass-panel border-b border-black/5 shadow-sm' : 'bg-transparent'}`}>
                        <div className="flex items-center shrink-0">
                            <img src="https://storage.googleapis.com/ixl-precision-public-assets/Scene%20Images/NCSFF2021color%20transparent%202.webp" alt="NCSFF Logo" className="h-12 md:h-14 w-auto object-contain" />
                        </div>

                        {/* Desktop Nav */}
                        <nav className="hidden lg:flex items-center gap-1 absolute left-1/2 transform -translate-x-1/2 bg-white/80 backdrop-blur-md p-1.5 rounded-full border border-black/10 shadow-lg">
                            {navLinks.map((link) => (
                                <button
                                    key={link.id}
                                    onClick={() => { if (link.id <= maxUnlockedModule) setCurrentModule(link.id); }}
                                    disabled={link.id > maxUnlockedModule}
                                    className={`px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest transition-all ${currentModule === link.id ? 'bg-black text-white shadow-md' : link.id > maxUnlockedModule ? 'text-black/20 cursor-not-allowed' : 'text-black/60 hover:bg-black/5 hover:text-black'}`}
                                >
                                    {link.label}
                                </button>
                            ))}
                        </nav>

                        <div className="flex items-center gap-2 md:gap-4 shrink-0">
                            <button onClick={() => togglePanel('menu')} className={`lg:hidden p-3 rounded-xl transition-all duration-300 ${scrolled ? 'hover:bg-black/5' : 'bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/20'}`}>
                                <span className={`material-symbols-outlined text-3xl ${scrolled ? 'text-black' : 'text-black md:text-white'}`}>menu</span>
                            </button>
                            
                            {/* Navigator Trigger */}
                            <button onClick={() => togglePanel('navigator')} className={`group relative p-3 rounded-xl transition-all duration-300 ${scrolled ? 'hover:bg-black/5' : 'bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/20'}`}>
                                <span className={`material-symbols-outlined text-3xl ${scrolled ? 'text-black' : 'text-black md:text-white'}`}>grid_view</span>
                                {shouldPulseGrid && (
                                    <span className="absolute -top-1 -right-1 flex h-4 w-4">
                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-coral-start opacity-75"></span>
                                        <span className="relative inline-flex rounded-full h-4 w-4 bg-coral-start"></span>
                                    </span>
                                )}
                            </button>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="w-full">
                        {currentModule === 0 && (
                            <React.Fragment>
                                <Hero />
                                <Module0 
                                    onOpenNavigator={() => togglePanel('navigator')} 
                                    navigatorUnlocked={navigatorUnlocked}
                                    onStartModule1={() => handleCompleteModule(0)} 
                                />
                            </React.Fragment>
                        )}
                        {currentModule === 1 && <Module1 onBack={() => setCurrentModule(0)} onComplete={() => handleCompleteModule(1)} bylawsUnlocked={bylawsUnlocked} onOpenNavigator={() => togglePanel('navigator')} cards={module1Cards} setCards={setModule1Cards} />}
                        {currentModule === 2 && <Module2 onBack={() => setCurrentModule(1)} onComplete={() => handleCompleteModule(2)} selectedRegion={m2SelectedRegion} setSelectedRegion={setM2SelectedRegion} scenarioStage={m2ScenarioStage} setScenarioStage={setM2ScenarioStage} scenarioFeedback={m2ScenarioFeedback} setScenarioFeedback={setM2ScenarioFeedback} completedStages={m2CompletedStages} setCompletedStages={setM2CompletedStages} checklist={m2Checklist} setChecklist={setM2Checklist} />}
                        {currentModule === 3 && <Module3 onBack={() => setCurrentModule(2)} onComplete={() => handleCompleteModule(3)} activePathway={m3ActivePathway} setActivePathway={setM3ActivePathway} m3FiscalPart1={m3FiscalPart1} setM3FiscalPart1={setM3FiscalPart1} m3FiscalPart2={m3FiscalPart2} setM3FiscalPart2={setM3FiscalPart2} ledgerUnlocked={ledgerUnlocked} setShowGridHighlight={setShowGridHighlight} />}
                        {currentModule === 4 && <Module4 onBack={() => setCurrentModule(3)} onComplete={() => handleCompleteModule(4)} playbookUnlocked={playbookUnlocked} assignments={m4Assignments} setAssignments={setM4Assignments} currentLeadIdx={m4CurrentLeadIdx} setCurrentLeadIdx={setM4CurrentLeadIdx} currentStepIdx={m4CurrentStepIdx} setCurrentStepIdx={setM4CurrentStepIdx} dialogueFeedback={m4DialogueFeedback} setDialogueFeedback={setM4DialogueFeedback} dialogueCorrect={m4DialogueCorrect} setDialogueCorrect={setM4DialogueCorrect} completedDialogueSteps={m4CompletedDialogueSteps} setCompletedDialogueSteps={setM4CompletedDialogueSteps} pivotScenarioIdx={m4PivotScenarioIdx} setPivotScenarioIdx={setM4PivotScenarioIdx} pivotPhase={m4PivotPhase} setPivotPhase={setM4PivotPhase} pivotFeedback={m4PivotFeedback} setPivotFeedback={setM4PivotFeedback} pivotCorrect={m4PivotCorrect} setPivotCorrect={setM4PivotCorrect} completedPivots={m4CompletedPivots} setCompletedPivots={setM4CompletedPivots} />}
                        {currentModule === 5 && <Module5 onBack={() => setCurrentModule(4)} onComplete={() => handleCompleteModule(5)} serviceUnlocked={serviceUnlocked} selectedSkills={selectedSkills} setSelectedSkills={setSelectedSkills} selectedInterests={selectedInterests} setSelectedInterests={setSelectedInterests} selectedTrack={m5SelectedTrack} setSelectedTrack={setM5SelectedTrack} />}
                        {currentModule === 6 && <Module6 onBack={() => setCurrentModule(5)} onComplete={() => alert('Course Completed.')} onNavigateHUD={() => togglePanel('navigator')} selectedSkills={selectedSkills} selectedInterests={selectedInterests} selectedDiag={m6SelectedDiag} setSelectedDiag={setM6SelectedDiag} inquiries={m6Inquiries} setInquiries={setM6Inquiries} lockedInquiries={m6LockedInquiries} setLockedInquiries={setM6LockedInquiries} activeMeetingGap={m6ActiveMeetingGap} setActiveMeetingGap={setM6ActiveMeetingGap} selectedMilestone={m6SelectedMilestone} setSelectedMilestone={setM6SelectedMilestone} isNotified={m6IsNotified} setIsNotified={setM6IsNotified} isFinished={m6IsFinished} setIsFinished={setM6IsFinished} />}

                        
                        <section className="py-20 bg-slate-50 text-center px-6 border-t border-black/5 mt-20">
                            <div className="max-w-2xl mx-auto">
                                <footer className="pt-8 flex flex-col md:flex-row justify-between items-center text-sm text-black/40">
                                    <p className="text-balance">© 2026 IXL Precision Learning Solutions, LLC.</p>
                                    <div className="flex gap-6 mt-4 md:mt-0">
                                        <button onClick={() => setShowPrivacy(true)} className="hover:text-black transition-colors">Privacy</button>
<button onClick={() => setShowTerms(true)} className="hover:text-black transition-colors">Terms</button>

                                    </div>
                                </footer>
                            </div>
                        </section>
                    </main>

                    <SidePanel 
                        isOpen={!!activePanel} 
                        onClose={() => setActivePanel(null)} 
                        type={activePanel || ''} 
                        onGridItemClick={handleGridItemClick}
                        highlightedGridId={showGridHighlight ? getHighlightedId() : null}
                        navLinks={navLinks}
                        currentModule={currentModule}
                        maxUnlockedModule={maxUnlockedModule}
                        onSelectModule={(id) => { setCurrentModule(id); setActivePanel(null); }}
                    />
                    
                    {showLexicon && <LexiconModal onClose={() => setShowLexicon(false)} />}
                    {showBylaws && <BylawsModal onClose={() => setShowBylaws(false)} />}
                    {showStrategy && <StrategyModal onClose={() => setShowStrategy(false)} />}
                    {showPlaybook && <PlaybookModal onClose={() => setShowPlaybook(false)} />}
{showSafeguards && <SafeguardsModal onClose={() => setShowSafeguards(false)} />}
{showNetwork && <NetworkModal onClose={() => setShowNetwork(false)} />}
{showPrivacy && <PrivacyModal onClose={() => setShowPrivacy(false)} />}
{showTerms && <TermsModal onClose={() => setShowTerms(false)} />}

                </div>
            );
        };


        // --- MOUNT TO DOM ---
        const rootElement = document.getElementById('root');
        if (rootElement) {
            const root = ReactDOM.createRoot(rootElement);
            root.render(<App />);
        }
